<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Shadow Dash · Premium Ninja Runner</title>
  <link rel="manifest" href="data:application/json,{}">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      padding: env(safe-area-inset);
      touch-action: manipulation;
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    #gameWrapper {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 6px;
      background: rgba(15, 20, 35, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    #gameContainer {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: 20px;
      overflow: hidden;
      background: #0a0f1a;
      touch-action: none;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* HUD */
    #hud {
      display: flex;
      gap: 8px;
      padding: 0 4px;
      flex-shrink: 0;
    }

    .hud-item {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 6px 4px;
      text-align: center;
    }

    .hud-label {
      font-size: 9px;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      font-weight: 600;
    }

    .hud-value {
      font-size: 18px;
      font-weight: 700;
      color: #f0f3ff;
      line-height: 1.2;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }

    /* Overlays */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(8, 12, 26, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
      transition: opacity 0.3s ease;
      border-radius: 20px;
    }

    .overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-content {
      text-align: center;
      max-width: 280px;
      color: white;
    }

    .overlay-title {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #d4b3ff, #8a6aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 40px rgba(120, 80, 255, 0.3);
      margin-bottom: 4px;
    }

    .overlay-sub {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .overlay-stats {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px 18px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 22px;
      display: inline-block;
      color: #f0f3ff;
      font-size: 16px;
    }

    .overlay-stats span {
      color: rgba(255, 255, 255, 0.4);
      margin: 0 6px;
    }

    .btn {
      background: linear-gradient(145deg, #7a5aff, #4f2bc0);
      border: none;
      padding: 14px 42px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 17px;
      color: white;
      box-shadow: 0 8px 28px rgba(80, 40, 200, 0.4);
      transition: transform 0.1s ease;
      touch-action: manipulation;
      cursor: pointer;
      letter-spacing: 0.02em;
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      overflow: hidden;
    }

    .btn:active {
      transform: scale(0.94);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      box-shadow: none;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 28px;
      font-size: 14px;
      margin-top: 8px;
    }

    .flex-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* Combo display */
    #comboDisplay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: 900;
      color: #ffd866;
      text-shadow: 0 0 30px rgba(255, 200, 50, 0.5), 0 4px 20px rgba(0, 0, 0, 0.8);
      pointer-events: none;
      z-index: 40;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #comboDisplay.active {
      opacity: 1;
    }

    @media (max-width: 480px) {
      #gameWrapper { padding: 4px; border-radius: 20px; }
      .hud-value { font-size: 16px; }
      .overlay-title { font-size: 30px; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      #gameWrapper { max-height: 100vh; }
      #gameContainer { border-radius: 12px; }
    }
  </style>
</head>
<body>
<div id="gameWrapper">
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <!-- Combo Display -->
    <div id="comboDisplay"></div>

    <!-- Start Overlay -->
    <div id="startOverlay" class="overlay">
      <div class="overlay-content">
        <div class="overlay-title">⚡ Shadow Dash</div>
        <div class="overlay-sub">Ninja runner · dodge, collect, survive</div>
        <button class="btn" id="startBtn">Begin Journey</button>
        <div style="margin-top:12px; font-size:12px; color:rgba(255,255,255,0.2);">tap / click to jump</div>
      </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOverOverlay" class="overlay hidden">
      <div class="overlay-content">
        <div class="overlay-title" style="font-size:30px;">💀 Fallen</div>
        <div class="overlay-stats">
          <span>🏯</span> <span id="finalScore">0</span>
          <span>·</span> best <span id="finalHigh">0</span>
          <span>·</span> 🪙 <span id="finalCoins">0</span>
        </div>
        <button class="btn" id="retryBtn">Rise Again</button>
        <button class="btn btn-secondary" id="menuBtn">Main Menu</button>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-item"><div class="hud-label">🏯 Score</div><div class="hud-value" id="hudScore">0</div></div>
    <div class="hud-item"><div class="hud-label">⚔️ Best</div><div class="hud-value" id="hudHigh">0</div></div>
    <div class="hud-item"><div class="hud-label">🪙 Coins</div><div class="hud-value" id="hudCoins">0</div></div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // ============================================================
  // STORAGE
  // ============================================================
  const STORAGE_KEY = 'shadowDash_data_v2';
  
  function loadStorage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        return {
          highScore: data.highScore || 0,
          coins: data.coins || 0,
          games: data.games || 0,
          totalCoins: data.totalCoins || 0,
          bestCombo: data.bestCombo || 0,
          obstaclesCleared: data.obstaclesCleared || 0,
          totalJumps: data.totalJumps || 0,
          playTime: data.playTime || 0,
          achievements: data.achievements || {},
          stats: data.stats || { runs: [] }
        };
      }
    } catch (_) {}
    return { highScore: 0, coins: 0, games: 0, totalCoins: 0, bestCombo: 0, 
             obstaclesCleared: 0, totalJumps: 0, playTime: 0, achievements: {}, stats: { runs: [] } };
  }

  function saveStorage() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(storage));
    } catch (_) {}
  }

  let storage = loadStorage();

  // ============================================================
  // CANVAS SETUP
  // ============================================================
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('gameContainer');

  let W, H, DPR;

  function resize() {
    const rect = container.getBoundingClientRect();
    DPR = window.devicePixelRatio || 1;
    W = rect.width;
    H = rect.height;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));

  // ============================================================
  // DOM REFS
  // ============================================================
  const hudScore = document.getElementById('hudScore');
  const hudHigh = document.getElementById('hudHigh');
  const hudCoins = document.getElementById('hudCoins');
  const finalScore = document.getElementById('finalScore');
  const finalHigh = document.getElementById('finalHigh');
  const finalCoins = document.getElementById('finalCoins');
  const startOverlay = document.getElementById('startOverlay');
  const gameOverOverlay = document.getElementById('gameOverOverlay');
  const comboDisplay = document.getElementById('comboDisplay');

  // ============================================================
  // GAME STATE
  // ============================================================
  const game = {
    running: false,
    over: false,
    score: 0,
    coins: 0,
    frame: 0,
    combo: 0,
    maxCombo: 0,
    comboCountdown: 0,
    obstaclesCleared: 0,
    jumps: 0,
    startTime: 0,
    totalTime: 0,
    nearMisses: 0,
    difficulty: 1,
    weather: 'clear',
    weatherTimer: 0,
    dayPhase: 0, // 0-1 cycle
    slowMo: false,
    slowMoTimer: 0,
    shakeX: 0,
    shakeY: 0,
    shakeIntensity: 0,
  };

  // ============================================================
  // PLAYER
  // ============================================================
  const player = {
    x: 0, y: 0, w: 0, h: 0,
    vy: 0,
    gravity: 0,
    jumpPower: 0,
    rotation: 0,
    squash: 1,
    stretch: 1,
    isGrounded: false,
    animTimer: 0,
    state: 'idle', // idle, jump, fall, hit, death, landing
  };

  // ============================================================
  // OBJECT POOLS
  // ============================================================
  class ObjectPool {
    constructor(factory, maxSize = 50) {
      this.factory = factory;
      this.pool = [];
      this.maxSize = maxSize;
      this.active = [];
    }

    get(...args) {
      let obj;
      if (this.pool.length > 0) {
        obj = this.pool.pop();
      } else {
        obj = this.factory(...args);
      }
      obj.active = true;
      this.active.push(obj);
      return obj;
    }

    release(obj) {
      obj.active = false;
      const idx = this.active.indexOf(obj);
      if (idx !== -1) this.active.splice(idx, 1);
      if (this.pool.length < this.maxSize) {
        this.pool.push(obj);
      }
    }

    releaseAll() {
      for (const obj of this.active) {
        if (this.pool.length < this.maxSize) {
          obj.active = false;
          this.pool.push(obj);
        }
      }
      this.active = [];
    }

    getActive() {
      return this.active.filter(o => o.active);
    }
  }

  // ============================================================
  // PARTICLE SYSTEM
  // ============================================================
  class Particle {
    constructor() {
      this.x = 0; this.y = 0;
      this.vx = 0; this.vy = 0;
      this.life = 0; this.maxLife = 0;
      this.size = 0;
      this.color = '';
      this.active = false;
      this.gravity = 0;
      this.friction = 0.99;
      this.type = 'dust';
    }

    init(x, y, vx, vy, life, size, color, gravity = 0.05, type = 'dust') {
      this.x = x; this.y = y;
      this.vx = vx; this.vy = vy;
      this.life = life; this.maxLife = life;
      this.size = size;
      this.color = color;
      this.gravity = gravity;
      this.friction = 0.99;
      this.type = type;
      this.active = true;
      return this;
    }

    update() {
      this.vx *= this.friction;
      this.vy += this.gravity;
      this.x += this.vx;
      this.y += this.vy;
      this.life--;
      if (this.life <= 0) this.active = false;
    }

    draw(ctx) {
      const alpha = this.life / this.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = this.color;
      const s = this.size * (0.5 + 0.5 * (this.life / this.maxLife));
      ctx.beginPath();
      ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  const particlePool = new ObjectPool(() => new Particle(), 200);

  function emitParticles(x, y, count, config) {
    for (let i = 0; i < count; i++) {
      const angle = config.angle !== undefined ? config.angle + rand(-0.5, 0.5) : rand(0, Math.PI * 2);
      const speed = config.speed !== undefined ? config.speed * (0.5 + Math.random() * 0.5) : rand(1, 4);
      const p = particlePool.get();
      p.init(
        x + rand(-5, 5),
        y + rand(-5, 5),
        Math.cos(angle) * speed,
        Math.sin(angle) * speed - (config.upward || 0),
        rand(config.lifeMin || 15, config.lifeMax || 30),
        rand(config.sizeMin || 2, config.sizeMax || 5),
        config.color || 'rgba(200,180,160,0.5)',
        config.gravity || 0.05,
        config.type || 'dust'
      );
    }
  }

  // ============================================================
  // UTILITY
  // ============================================================
  function rand(min, max) { return Math.random() * (max - min) + min; }
  function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  // ============================================================
  // BACKGROUND LAYERS
  // ============================================================
  const bgLayers = {
    moon: { y: 0.08, size: 0.09, speed: 0.02 },
    clouds: { y: 0.15, speed: 0.05, count: 6 },
    mountains: { y: 0.35, speed: 0.15 },
    forest: { y: 0.50, speed: 0.25 },
    temple: { y: 0.40, speed: 0.12 },
    mist: { y: 0.65, speed: 0.08 },
  };

  let bgOffset = 0;
  let weatherParticles = [];

  function updateBackground() {
    bgOffset += 0.2;
    game.dayPhase += 0.0003;
    if (game.dayPhase > 1) game.dayPhase -= 1;
  }

  function drawBackground() {
    const dayFactor = Math.sin(game.dayPhase * Math.PI * 2) * 0.5 + 0.5;
    const night = dayFactor < 0.3;
    const dusk = dayFactor > 0.3 && dayFactor < 0.7;
    
    // Sky gradient
    let skyGrad;
    if (night) {
      skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#0a0e1a');
      skyGrad.addColorStop(0.5, '#141c2e');
      skyGrad.addColorStop(1, '#1a1528');
    } else if (dusk) {
      skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#1a1a3a');
      skyGrad.addColorStop(0.4, '#3a2a4a');
      skyGrad.addColorStop(0.8, '#5a3a3a');
      skyGrad.addColorStop(1, '#2a1a2a');
    } else {
      skyGrad = ctx.createLinearGradient(0, 0, 0, H);
      skyGrad.addColorStop(0, '#1a2a5a');
      skyGrad.addColorStop(0.4, '#3a4a7a');
      skyGrad.addColorStop(0.8, '#6a5a4a');
      skyGrad.addColorStop(1, '#2a2a3a');
    }
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Moon
    const moonX = W * 0.8 + Math.sin(game.dayPhase * Math.PI * 2) * W * 0.3;
    const moonY = H * 0.12;
    const moonSize = W * 0.09;
    if (night || dusk) {
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonSize, 0, Math.PI * 2);
      ctx.fillStyle = '#ffecbb';
      ctx.shadowColor = '#ffd966';
      ctx.shadowBlur = 50;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Mountains
    ctx.fillStyle = night ? '#0d1220' : '#1a253a';
    ctx.beginPath();
    ctx.moveTo(0, H * 0.5);
    for (let x = 0; x <= W; x += 2) {
      const y = H * 0.45 + Math.sin(x * 0.005 + bgOffset * 0.02) * 30 + 
                Math.sin(x * 0.012 + bgOffset * 0.01 + 2) * 20;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.fill();

    // Forest
    ctx.fillStyle = night ? '#0a1518' : '#1a2a20';
    for (let i = 0; i < 20; i++) {
      const x = (i / 20) * W + bgOffset * 0.1 % W;
      const h = H * (0.08 + Math.sin(i * 1.7 + 1) * 0.04);
      ctx.fillRect(x, H * 0.55 - h, W * 0.025, h);
    }

    // Temple silhouette
    ctx.fillStyle = night ? '#0a0a15' : '#1a1a2a';
    const templeX = W * 0.3 + Math.sin(bgOffset * 0.005) * W * 0.1;
    ctx.fillRect(templeX, H * 0.42, W * 0.15, H * 0.1);
    ctx.fillRect(templeX + W * 0.04, H * 0.35, W * 0.07, H * 0.07);
    ctx.fillRect(templeX + W * 0.06, H * 0.28, W * 0.03, H * 0.07);

    // Ground
    ctx.fillStyle = night ? '#0d0a08' : '#1a1815';
    ctx.fillRect(0, H - 12, W, 12);
    ctx.fillStyle = night ? '#15100a' : '#2a2520';
    ctx.fillRect(0, H - 8, W, 8);

    // Mist
    ctx.fillStyle = night ? 'rgba(100,120,160,0.03)' : 'rgba(180,200,220,0.05)';
    for (let i = 0; i < 3; i++) {
      const x = (i / 3) * W + bgOffset * 0.05 % W;
      ctx.beginPath();
      ctx.ellipse(x, H * 0.6 + i * 20, W * 0.3, 30, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ============================================================
  // WEATHER SYSTEM
  // ============================================================
  function initWeather() {
    const weathers = ['clear', 'rain', 'snow', 'wind', 'leaves'];
    game.weather = weathers[randInt(0, weathers.length - 1)];
    game.weatherTimer = 600 + randInt(0, 300);
    weatherParticles = [];
  }

  function updateWeather() {
    game.weatherTimer--;
    if (game.weatherTimer <= 0) {
      initWeather();
    }

    if (game.weather === 'rain') {
      if (weatherParticles.length < 80) {
        weatherParticles.push({
          x: rand(0, W),
          y: rand(-20, 0),
          speed: rand(4, 8),
          length: rand(8, 16),
          opacity: rand(0.1, 0.3)
        });
      }
    } else if (game.weather === 'snow') {
      if (weatherParticles.length < 50) {
        weatherParticles.push({
          x: rand(0, W),
          y: rand(-20, 0),
          speed: rand(0.5, 2),
          size: rand(2, 5),
          drift: rand(-0.5, 0.5)
        });
      }
    } else if (game.weather === 'leaves') {
      if (weatherParticles.length < 20) {
        weatherParticles.push({
          x: rand(0, W),
          y: rand(-20, 0),
          speed: rand(1, 3),
          size: rand(3, 7),
          rotation: rand(0, Math.PI * 2),
          rotSpeed: rand(-0.05, 0.05),
          color: `hsl(${randInt(30, 60)}, 80%, ${randInt(30, 50)}%)`
        });
      }
    }

    for (let i = weatherParticles.length - 1; i >= 0; i--) {
      const p = weatherParticles[i];
      if (game.weather === 'rain') {
        p.x += p.speed * 0.3;
        p.y += p.speed;
        if (p.y > H) { weatherParticles.splice(i, 1); continue; }
      } else if (game.weather === 'snow') {
        p.x += p.drift;
        p.y += p.speed;
        if (p.y > H) { weatherParticles.splice(i, 1); continue; }
      } else if (game.weather === 'leaves') {
        p.x += Math.sin(p.rotation) * 0.5;
        p.y += p.speed;
        p.rotation += p.rotSpeed;
        if (p.y > H) { weatherParticles.splice(i, 1); continue; }
      }
    }
  }

  function drawWeather() {
    if (game.weather === 'rain') {
      for (const p of weatherParticles) {
        ctx.strokeStyle = `rgba(180,200,255,${p.opacity})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.length * 0.3, p.y + p.length);
        ctx.stroke();
      }
    } else if (game.weather === 'snow') {
      for (const p of weatherParticles) {
        ctx.fillStyle = `rgba(255,255,255,${0.4 + Math.random() * 0.3})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (game.weather === 'leaves') {
      for (const p of weatherParticles) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
  }

  // ============================================================
  // OBSTACLE SYSTEM
  // ============================================================
  class Obstacle {
    constructor() {
      this.x = 0;
      this.y = 0;
      this.width = 0;
      this.height = 0;
      this.topH = 0;
      this.gap = 0;
      this.type = 'wall';
      this.scored = false;
      this.active = false;
      this.rotation = 0;
      this.speed = 0;
      this.passed = false;
    }

    init(x, topH, gap, type = 'wall') {
      this.x = x;
      this.topH = topH;
      this.gap = gap;
      this.type = type;
      this.width = W * (0.08 + rand(0, 0.03));
      this.scored = false;
      this.active = true;
      this.passed = false;
      this.rotation = 0;
      
      if (type === 'blade') {
        this.width = W * 0.06;
        this.rotation = rand(0, Math.PI * 2);
      } else if (type === 'bridge') {
        this.width = W * 0.15;
      } else if (type === 'torii') {
        this.width = W * 0.1;
      } else if (type === 'fire') {
        this.width = W * 0.08;
        this.topH = topH + rand(-20, 20);
      }
      return this;
    }

    update(speed) {
      this.x -= speed;
      if (this.type === 'blade') this.rotation += 0.05;
      if (this.x + this.width < 0) this.active = false;
    }

    draw(ctx) {
      const x = this.x;
      const w = this.width;
      const top = this.topH;
      const gap = this.gap;

      if (this.type === 'wall' || this.type === 'torii') {
        // Main pillars
        ctx.fillStyle = this.type === 'torii' ? '#5a3a2a' : '#3d2c1e';
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 10;
        ctx.fillRect(x, 0, w * 0.2, top);
        ctx.fillRect(x + w * 0.8, 0, w * 0.2, top);
        ctx.fillRect(x, top + gap, w * 0.2, H - top - gap);
        ctx.fillRect(x + w * 0.8, top + gap, w * 0.2, H - top - gap);
        
        // Top beam (torii style)
        if (this.type === 'torii') {
          ctx.fillStyle = '#6a4a3a';
          ctx.fillRect(x - 4, top - 6, w + 8, 8);
          ctx.fillRect(x - 4, top + gap - 2, w + 8, 8);
        } else {
          ctx.fillRect(x, top - 4, w, 6);
          ctx.fillRect(x, top + gap - 2, w, 6);
        }
        ctx.shadowBlur = 0;

        // Glow effect
        if (this.type === 'torii') {
          ctx.fillStyle = 'rgba(255,200,100,0.05)';
          ctx.fillRect(x, top, w, gap);
        }
      } else if (this.type === 'blade') {
        ctx.save();
        ctx.translate(x + w/2, top + gap/2);
        ctx.rotate(this.rotation);
        ctx.fillStyle = '#8a8a9a';
        ctx.shadowColor = 'rgba(200,200,255,0.2)';
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.ellipse(0, 0, w/2, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#aab0c0';
        for (let i = 0; i < 4; i++) {
          const angle = (i / 4) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(angle) * w/2, Math.sin(angle) * w/2);
          ctx.strokeStyle = '#cccce0';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        ctx.shadowBlur = 0;
        ctx.restore();
      } else if (this.type === 'fire') {
        for (let i = 0; i < 8; i++) {
          const fx = x + rand(0, w);
          const fy = top + rand(0, gap);
          const size = rand(4, 12);
          const alpha = rand(0.3, 0.7);
          ctx.fillStyle = `rgba(255,${randInt(100, 200)},0,${alpha})`;
          ctx.beginPath();
          ctx.arc(fx, fy, size, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (this.type === 'bridge') {
        ctx.fillStyle = '#4a3a2a';
        ctx.fillRect(x, top, w, 6);
        ctx.fillRect(x, top + gap - 6, w, 6);
        for (let i = 0; i < 6; i++) {
          const bx = x + (i / 5) * w;
          ctx.fillRect(bx - 1, top, 2, gap);
        }
      }
    }

    getTopY() { return this.topH; }
    getBottomY() { return this.topH + this.gap; }
  }

  const obstaclePool = new ObjectPool(() => new Obstacle(), 30);
  let obstacles = [];

  function spawnObstacle() {
    const types = ['wall', 'torii', 'blade', 'fire', 'bridge'];
    const type = types[randInt(0, types.length - 1)];
    const gapSize = H * (0.22 + (1 - Math.min(game.difficulty / 10, 0.6)) * 0.12);
    const minTop = H * 0.05;
    const maxTop = H * 0.7;
    const topH = minTop + Math.random() * (maxTop - minTop);
    
    const obs = obstaclePool.get();
    obs.init(W + 20, topH, gapSize, type);
    obstacles.push(obs);
  }

  // ============================================================
  // COIN SYSTEM
  // ============================================================
  class Coin {
    constructor() {
      this.x = 0; this.y = 0;
      this.r = 0;
      this.collected = false;
      this.active = false;
      this.bob = 0;
      this.type = 'normal';
      this.glow = 0;
    }

    init(x, y, type = 'normal') {
      this.x = x;
      this.y = y;
      this.type = type;
      this.r = type === 'diamond' ? W * 0.025 : type === 'golden' ? W * 0.03 : W * 0.02;
      this.collected = false;
      this.active = true;
      this.bob = rand(0, Math.PI * 2);
      this.glow = 0;
      return this;
    }

    update(speed) {
      this.x -= speed;
      this.bob += 0.04;
      this.y += Math.sin(this.bob) * 0.15;
      this.glow = Math.sin(this.bob * 2) * 0.3 + 0.7;
      if (this.x + this.r < 0) this.active = false;
    }

    draw(ctx) {
      const colors = {
        normal: { fill: '#f7d44a', stroke: '#bf8f2a', glow: '#f7b32b' },
        golden: { fill: '#ffd700', stroke: '#daa520', glow: '#ffdd44' },
        diamond: { fill: '#7fe0ff', stroke: '#4a9fcf', glow: '#8af0ff' }
      };
      const c = colors[this.type] || colors.normal;
      
      ctx.shadowColor = c.glow;
      ctx.shadowBlur = 15 * this.glow;
      ctx.fillStyle = c.fill;
      ctx.strokeStyle = c.stroke;
      ctx.lineWidth = 1.5;

      if (this.type === 'diamond') {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - this.r);
        ctx.lineTo(this.x + this.r, this.y);
        ctx.lineTo(this.x, this.y + this.r);
        ctx.lineTo(this.x - this.r, this.y);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // Inner star for golden
        if (this.type === 'golden') {
          ctx.fillStyle = 'rgba(255,255,200,0.3)';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r * 0.4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.shadowBlur = 0;
    }
  }

  const coinPool = new ObjectPool(() => new Coin(), 40);
  let coins = [];

  function spawnCoin() {
    const types = ['normal', 'normal', 'normal', 'golden', 'diamond'];
    const type = types[randInt(0, types.length - 1)];
    const y = rand(H * 0.12, H * 0.82);
    const c = coinPool.get();
    c.init(W + 30, y, type);
    coins.push(c);
  }

  // ============================================================
  // ENEMY SYSTEM (simplified)
  // ============================================================
  class Enemy {
    constructor() {
      this.x = 0; this.y = 0;
      this.w = 0; this.h = 0;
      this.active = false;
      this.type = 'bat';
      this.vy = 0;
      this.vx = 0;
      this.phase = 0;
      this.diving = false;
      this.diveTimer = 0;
    }

    init(x, y, type = 'bat') {
      this.x = x;
      this.y = y;
      this.type = type;
      this.w = W * 0.04;
      this.h = this.w;
      this.active = true;
      this.phase = rand(0, Math.PI * 2);
      this.diving = false;
      this.diveTimer = 0;
      this.vy = rand(-0.5, 0.5);
      this.vx = -rand(0.5, 1.5);
      if (type === 'crow') { this.h = this.w * 1.2; }
      if (type === 'ghost') { this.h = this.w * 1.3; this.vx *= 0.5; }
      return this;
    }

    update(speed, playerY) {
      this.x -= speed * 0.8 + this.vx * 0.2;
      
      if (this.type === 'bat') {
        this.y += Math.sin(this.phase) * 0.5;
        this.phase += 0.05;
      } else if (this.type === 'crow') {
        this.y += Math.sin(this.phase) * 0.8;
        this.phase += 0.07;
        if (!this.diving && Math.random() < 0.005) {
          this.diving = true;
          this.diveTimer = 30;
        }
        if (this.diving) {
          this.y += 1.5;
          this.diveTimer--;
          if (this.diveTimer <= 0) this.diving = false;
        }
      } else if (this.type === 'ghost') {
        this.y += Math.sin(this.phase) * 0.3;
        this.phase += 0.03;
        this.y += Math.sin(this.phase * 0.5) * 0.2;
      }
      
      if (this.x + this.w < -20) this.active = false;
    }

    draw(ctx) {
      const x = this.x, y = this.y, w = this.w, h = this.h;
      ctx.save();
      
      if (this.type === 'bat') {
        ctx.fillStyle = '#2a1a2a';
        ctx.beginPath();
        ctx.ellipse(x + w/2, y + h/2, w/2, h/2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        // wings
        ctx.fillStyle = '#1a0a1a';
        ctx.beginPath();
        ctx.ellipse(x - w*0.2, y + h*0.2, w*0.4, h*0.3, -0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + w*1.2, y + h*0.2, w*0.4, h*0.3, 0.3, 0, Math.PI * 2);
        ctx.fill();
        // eyes
        ctx.fillStyle = '#ff4444';
        ctx.beginPath();
        ctx.arc(x + w*0.3, y + h*0.4, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + w*0.7, y + h*0.4, 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (this.type === 'crow') {
        ctx.fillStyle = '#1a1a2a';
        ctx.beginPath();
        ctx.ellipse(x + w/2, y + h/2, w/2, h/2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0a0a1a';
        ctx.beginPath();
        ctx.moveTo(x + w*0.8, y + h*0.3);
        ctx.lineTo(x + w*1.3, y + h*0.5);
        ctx.lineTo(x + w*0.8, y + h*0.7);
        ctx.fill();
        ctx.fillStyle = '#ffaa44';
        ctx.beginPath();
        ctx.arc(x + w*0.3, y + h*0.4, 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (this.type === 'ghost') {
        ctx.fillStyle = 'rgba(200,200,255,0.3)';
        ctx.shadowColor = 'rgba(150,150,255,0.2)';
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.arc(x + w/2, y + h/2, w/2, 0, Math.PI);
        ctx.lineTo(x + w, y + h);
        ctx.lineTo(x, y + h);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath();
        ctx.arc(x + w*0.3, y + h*0.4, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + w*0.7, y + h*0.4, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    }
  }

  const enemyPool = new ObjectPool(() => new Enemy(), 20);
  let enemies = [];

  function spawnEnemy() {
    const types = ['bat', 'bat', 'crow', 'ghost'];
    const type = types[randInt(0, types.length - 1)];
    const y = rand(H * 0.1, H * 0.7);
    const e = enemyPool.get();
    e.init(W + 20, y, type);
    enemies.push(e);
  }

  // ============================================================
  // POWERUP SYSTEM (simplified)
  // ============================================================
  let powerups = [];
  let activePowerups = {};

  function spawnPowerup() {
    const types = ['shield', 'magnet', 'doubleJump', 'slowMo'];
    const type = types[randInt(0, types.length - 1)];
    powerups.push({
      x: W + 20,
      y: rand(H * 0.15, H * 0.75),
      type: type,

    });

  // ============================================================
  // GAME INIT
  // ============================================================
  function initGame() {
    const pw = W * 0.07;
    player.w = pw;
    player.h = pw * 1.3;
    player.x = W * 0.22;
    player.y = H * 0.4;
    player.vy = 0;
    player.gravity = H * 0.0006;
    player.jumpPower = H * 0.014;
    player.rotation = 0;
    player.squash = 1;
    player.stretch = 1;
    player.isGrounded = false;
    player.state = 'idle';
    player.animTimer = 0;

    obstacles = [];
    coins = [];
    enemies = [];
    powerups = [];
    particlePool.releaseAll();
    weatherParticles = [];

    game.running = true;
    game.over = false;
    game.score = 0;
    game.coins = 0;
    game.frame = 0;
    game.combo = 0;
    game.maxCombo = 0;
    game.comboCountdown = 0;
    game.obstaclesCleared = 0;
    game.jumps = 0;
    game.startTime = Date.now();
    game.totalTime = 0;
    game.nearMisses = 0;
    game.difficulty = 1;
    game.slowMo = false;
    game.slowMoTimer = 0;
    game.shakeIntensity = 0;

    activePowerups = {};
    initWeather();
    
    updateHUD();
    gameOverOverlay.classList.add('hidden');
    comboDisplay.classList.remove('active');
  }

  // ============================================================
  // JUMP
  // ============================================================
  function jump() {
    if (!game.running || game.over) return;
    
    const doubleJump = activePowerups.doubleJump && activePowerups.doubleJump > 0;
    if (!player.isGrounded && !doubleJump) return;
    
    player.vy = -player.jumpPower;
    player.isGrounded = false;
    player.state = 'jump';
    game.jumps++;
    storage.totalJumps++;
    
    emitParticles(player.x + player.w/2, player.y + player.h, 6, {
      color: 'rgba(200,180,220,0.3)',
      speed: 2,
      upward: 1,
      lifeMin: 10,
      lifeMax: 20,
      sizeMin: 2,
      sizeMax: 4
    });
    
    if (doubleJump) {
      activePowerups.doubleJump--;
      emitParticles(player.x + player.w/2, player.y, 12, {
        color: 'rgba(100,200,255,0.5)',
        speed: 3,
        upward: 2,
        lifeMin: 15,
        lifeMax: 25
      });
    }
  }

  // ============================================================
  // UPDATE
  // ============================================================
  function update() {
    if (!game.running || game.over) return;

    const difficulty = 1 + game.score / 200;
    game.difficulty = Math.min(difficulty, 4);
    const speed = W * (0.008 + game.difficulty * 0.001);
    const slowMo = game.slowMo || activePowerups.slowMo;
    const speedMult = slowMo ? 0.4 : 1;

    // Player physics
    const gravMult = activePowerups.feather ? 0.3 : 1;
    player.vy += player.gravity * gravMult * (slowMo ? 0.5 : 1);
    player.y += player.vy * (slowMo ? 0.5 : 1);

    // Ground collision
    if (player.y + player.h >= H) {
      player.y = H - player.h;
      if (!player.isGrounded) {
        player.isGrounded = true;
        player.state = 'landing';
        emitParticles(player.x + player.w/2, H, 8, {
          color: 'rgba(180,160,140,0.4)',
          speed: 1.5,
          upward: 0.5,
          lifeMin: 15,
          lifeMax: 25
        });
      }
      if (player.vy > 1) player.vy = 0;
    }

    if (player.y < 0) {
      player.y = 0;
      player.vy = 0;
    }

    // Player rotation
    const targetRot = player.vy * 0.03;
    player.rotation += (targetRot - player.rotation) * 0.1;
    player.rotation = clamp(player.rotation, -0.5, 0.5);

    // Squash and stretch
    if (player.isGrounded) {
      player.squash = 1;
      player.stretch = 1;
    } else {
      player.squash = 1 - Math.abs(player.vy) * 0.001;
      player.stretch = 1 + Math.abs(player.vy) * 0.001;
      player.squash = clamp(player.squash, 0.7, 1);
      player.stretch = clamp(player.stretch, 1, 1.3);
    }

    // Combo
    if (game.comboCountdown > 0) {
      game.comboCountdown--;
      if (game.comboCountdown === 0) {
        game.combo = 0;
        comboDisplay.classList.remove('active');
      }
    }

    // Update obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.update(speed * speedMult);
      if (!o.active) {
        obstaclePool.release(o);
        obstacles.splice(i, 1);
        continue;
      }

      if (!o.scored && o.x + o.width < player.x) {
        o.scored = true;
        game.score += 1 + Math.floor(game.combo / 5);
        game.obstaclesCleared++;
        storage.obstaclesCleared++;
        updateCombo(1);
        
        // Near miss bonus
        const distToTop = Math.abs(player.y - o.topH);
        const distToBottom = Math.abs(player.y + player.h - (o.topH + o.gap));
        if (distToTop < 15 || distToBottom < 15) {
          game.nearMisses++;
          game.score += 2;
          emitParticles(player.x + player.w/2, player.y, 10, {
            color: 'rgba(255,215,0,0.6)',
            speed: 3,
            lifeMin: 15,
            lifeMax: 25,
            sizeMin: 2,
            sizeMax: 5
          });
        }
      }

      // Collision
      if (player.x < o.x + o.width && player.x + player.w > o.x) {
        if (player.y < o.topH || player.y + player.h > o.topH + o.gap) {
          // Shield check
          if (activePowerups.shield && activePowerups.shield > 0) {
            activePowerups.shield--;
            emitParticles(player.x + player.w/2, player.y, 20, {
              color: 'rgba(100,200,255,0.6)',
              speed: 4,
              lifeMin: 20,
              lifeMax: 30
            });
            // Destroy obstacle
            o.active = false;
            continue;
          }
          gameOver();
          return;
        }
      }
    }

    // Update coins
    for (let i = coins.length - 1; i >= 0; i--) {
      const c = coins[i];
      c.update(speed * speedMult);
      if (!c.active) {
        coinPool.release(c);
        coins.splice(i, 1);
        continue;
      }
      
      if (!c.collected) {
        const dx = (player.x + player.w/2) - c.x;
        const dy = (player.y + player.h/2) - c.y;
        const magnet = activePowerups.magnet || false;
        const range = magnet ? 60 : 15;
        if (Math.abs(dx) < range && Math.abs(dy) < range) {
          c.collected = true;
          const worth = c.type === 'diamond' ? 5 : c.type === 'golden' ? 3 : 1;
          game.coins += worth;
          storage.coins += worth;
          storage.totalCoins += worth;
          game.score += worth;
          emitParticles(c.x, c.y, 15, {
            color: c.type === 'diamond' ? 'rgba(100,200,255,0.8)' : 'rgba(255,215,0,0.8)',
            speed: 3,
            lifeMin: 15,
            lifeMax: 25,
            sizeMin: 2,
            sizeMax: 5
          });
          coinPool.release(c);
          coins.splice(i, 1);
          updateCombo(2);
          updateHUD();
        }
      }
    }

    // Update enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.update(speed * speedMult, player.y);
      if (!e.active) {
        enemyPool.release(e);
        enemies.splice(i, 1);
        continue;
      }
      
      // Simple collision
      if (player.x < e.x + e.w && player.x + player.w > e.x &&
          player.y < e.y + e.h && player.y + player.h > e.y) {
        if (activePowerups.shield && activePowerups.shield > 0) {
          activePowerups.shield--;
          e.active = false;
          emitParticles(e.x + e.w/2, e.y, 15, {
            color: 'rgba(100,200,255,0.6)',
            speed: 4,
            lifeMin: 15,
            lifeMax: 25
          });
          continue;
        }
        gameOver();
        return;
      }
    }

    // Update powerups
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.x -= speed * speedMult;
      p.bob += 0.04;
      p.y += Math.sin(p.bob) * 0.15;
      
      if (p.x + p.size < 0) {
        powerups.splice(i, 1);
        continue;
      }
      
      if (!p.collected) {
        const dx = (player.x + player.w/2) - p.x;
        const dy = (player.y + player.h/2) - p.y;
        if (Math.abs(dx) < p.size + 15 && Math.abs(dy) < p.size + 15) {
          p.collected = true;
          activePowerups[p.type] = (activePowerups[p.type] || 0) + 1;
          if (p.type === 'slowMo') {
            game.slowMo = true;
            game.slowMoTimer = 120;
          }
          emitParticles(p.x, p.y, 20, {
            color: 'rgba(200,150,255,0.6)',
            speed: 4,
            lifeMin: 20,
            lifeMax: 30
          });
          powerups.splice(i, 1);
        }
      }
    }

    // Update active powerups
    for (const key in activePowerups) {
      if (activePowerups[key] <= 0) {
        delete activePowerups[key];
        if (key === 'slowMo') game.slowMo = false;
      }
    }
    if (game.slowMoTimer > 0) {
      game.slowMoTimer--;
      if (game.slowMoTimer === 0) {
        game.slowMo = false;
        delete activePowerups.slowMo;
      }
    }

    // Spawn
    game.frame++;
    const spawnRate = Math.max(60, 120 - Math.floor(game.difficulty * 8));
    if (game.frame % spawnRate === 0) {
      spawnObstacle();
      if (Math.random() < 0.4) spawnCoin();
      if (Math.random() < 0.15 + game.difficulty * 0.02) spawnEnemy();
      if (Math.random() < 0.05) spawnPowerup();
    }
    if (game.frame % 20 === 0 && Math.random() < 0.2) spawnCoin();

    // Score over time
    if (game.frame % 5 === 0) {
      game.score += 0.1 * (1 + game.combo * 0.05);
    }

    // Update HUD
    if (game.frame % 3 === 0) updateHUD();

    // Update particles
    for (const p of particlePool.getActive()) {
      p.update();
    }

    // Update weather
    if (game.frame % 2 === 0) updateWeather();

    // Background
    updateBackground();

    // Running dust
    if (player.isGrounded && game.frame % 3 === 0) {
      emitParticles(player.x + player.w/2, H, 1, {
        color: 'rgba(180,160,140,0.2)',
        speed: 0.5,
        upward: 0.2,
        lifeMin: 10,
        lifeMax: 20,
        sizeMin: 1,
        sizeMax: 3
      });
    }
  }

  // ============================================================
  // COMBO
  // ============================================================
  function updateCombo(increment) {
    game.combo += increment;
    if (game.combo > game.maxCombo) {
      game.maxCombo = game.combo;
      storage.bestCombo = Math.max(storage.bestCombo, game.maxCombo);
    }
    game.comboCountdown = 60;
    
    if (game.combo >= 2) {
      comboDisplay.textContent = `x${Math.floor(game.combo)}`;
      comboDisplay.classList.add('active');
    } else {
      comboDisplay.classList.remove('active');
    }
  }

  // ============================================================
  // GAME OVER
  // ============================================================
  function gameOver() {
    if (game.over) return;
    game.over = true;
    game.running = false;
    game.totalTime = (Date.now() - game.startTime) / 1000;
    storage.playTime += game.totalTime;
    storage.games++;
    
    if (game.score > storage.highScore) {
      storage.highScore = Math.floor(game.score);
    }
    
    saveStorage();
    
    finalScore.textContent = Math.floor(game.score);
    finalHigh.textContent = storage.highScore;
    finalCoins.textContent = game.coins;
    
    gameOverOverlay.classList.remove('hidden');
    
    // Death particles
    emitParticles(player.x + player.w/2, player.y + player.h/2, 30, {
      color: 'rgba(255,80,80,0.5)',
      speed: 5,
      lifeMin: 20,
      lifeMax: 40,
      sizeMin: 3,
      sizeMax: 7
    });
    
    game.shakeIntensity = 10;
    updateHUD();
  }

  // ============================================================
  // DRAW
  // ============================================================
  function draw() {
    ctx.save();
    
    // Screen shake
    if (game.shakeIntensity > 0) {
      const shake = game.shakeIntensity * 0.3;
      ctx.translate(
        (Math.random() - 0.5) * shake * 2,
        (Math.random() - 0.5) * shake * 2
      );
      game.shakeIntensity *= 0.9;
      if (game.shakeIntensity < 0.1) game.shakeIntensity = 0;
    }
    
    // Background
    drawBackground();
    
    // Weather
    drawWeather();
    
    // Obstacles
    for (const o of obstacles) {
      o.draw(ctx);
    }
    
    // Coins
    for (const c of coins) {
      c.draw(ctx);
    }
    
    // Enemies
    for (const e of enemies) {
      e.draw(ctx);
    }
    
    // Powerups
    for (const p of powerups) {
      const colors = {
        shield: '#6af',
        magnet: '#fa6',
        doubleJump: '#af6',
        slowMo: '#6af',
        feather: '#f6a',
        bomb: '#f66'
      };
      ctx.fillStyle = colors[p.type] || '#fff';
      ctx.shadowColor = colors[p.type] || '#fff';
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.font = `${p.size}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const icons = { shield: '🛡', magnet: '🧲', doubleJump: '⬆', slowMo: '⏱', feather: '🪶', bomb: '💥' };
      ctx.fillText(icons[p.type] || '?', p.x, p.y + 1);
    }
    
    // Player
    drawPlayer();
    
    // Particles
    for (const p of particlePool.getActive()) {
      p.draw(ctx);
    }
    
    // Shield effect
    if (activePowerups.shield) {
      ctx.strokeStyle = `rgba(100,180,255,${0.2 + Math.sin(game.frame * 0.05) * 0.1})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(player.x + player.w/2, player.y + player.h/2, player.w * 1.1, 0, Math.PI * 2);
      ctx.stroke();
    }
    
    ctx.restore();
  }

  // ============================================================
  // DRAW PLAYER
  // ============================================================
  function drawPlayer() {
    const px = player.x, py = player.y;
    ctx.save();
    ctx.translate(px + player.w/2, py + player.h/2);
    ctx.rotate(player.rotation);
    ctx.scale(1 / player.squash, player.stretch);
    
    // Shadow
    ctx.shadowColor = 'rgba(80,60,150,0.2)';
    ctx.shadowBlur = 20;
    
    // Body
    const grad = ctx.createLinearGradient(-player.w/2, -player.h/2, player.w/2, player.h/2);
    grad.addColorStop(0, '#2a2440');
    grad.addColorStop(1, '#1a1530');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(0, 0, player.w/2, player.h/2.2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Head
    ctx.fillStyle = '#2c2640';
    ctx.beginPath();
    ctx.ellipse(0, -3, player.w/2.3, player.h/3.2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Headband
    ctx.fillStyle = '#d44a4a';
    ctx.fillRect(-player.w/2.2, -player.h/2.8, player.w/1.1, 3);
    ctx.fillStyle = '#e86a6a';
    ctx.fillRect(-player.w/2.6, -player.h/2.8, 5, 6);
    
    // Eyes (follow direction)
    const eyeY = -3;
    ctx.fillStyle = '#f0ecf8';
    ctx.beginPath();
    ctx.ellipse(-5, eyeY, 3.5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(5, eyeY, 3.5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#14101f';
    const eyeOff = player.vy > 0 ? 1 : -1;
    ctx.beginPath();
    ctx.arc(-4 + eyeOff, eyeY + 0.5, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6 + eyeOff, eyeY + 0.5, 2, 0, Math.PI * 2);
    ctx.fill();
    
    // Scarf
    ctx.fillStyle = '#d44a4a';
    ctx.beginPath();
    ctx.moveTo(-player.w/2.5, player.h/4);
    ctx.quadraticCurveTo(0, player.h/2.5, player.w/2.5, player.h/4);
    ctx.fill();
    
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ============================================================
  // HUD UPDATE
  // ============================================================
  function updateHUD() {
    hudScore.textContent = Math.floor(game.score);
    hudHigh.textContent = storage.highScore;
    hudCoins.textContent = storage.coins;
  }

  // ============================================================
  // START / RETRY
  // ============================================================
  function startGame() {
    startOverlay.classList.add('hidden');
    initGame();
  }

  function retryGame() {
    gameOverOverlay.classList.add('hidden');
    initGame();
  }

  function goToMenu() {
    gameOverOverlay.classList.add('hidden');
    startOverlay.classList.remove('hidden');
  }

  // ============================================================
  // EVENT BINDING
  // ============================================================
  function handleTap(e) {
    if (e) e.preventDefault();
    if (!game.running || game.over) return;
    jump();
  }

  document.addEventListener('click', handleTap);
  document.addEventListener('touchstart', handleTap, { passive: false });

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('retryBtn').addEventListener('click', retryGame);
  document.getElementById('menuBtn').addEventListener('click', goToMenu);

  // ============================================================
  // GAME LOOP
  // ============================================================
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // Bootstrap
  updateHUD();
  loop();

  // Show start overlay initially
  startOverlay.classList.remove('hidden');
  gameOverOverlay.classList.add('hidden');

  console.log('⚡ Shadow Dash loaded — premium ninja runner');
})();
</script>
</body>
</html>
